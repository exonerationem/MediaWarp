name: Build Docker

on:
  workflow_call:
    inputs:
      push:
        description: "Whether to push the Docker image"
        required: true
        type: boolean
      tags:
        description: "docker/metadata-action tag rules"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: MediaWarp_linux_*
          path: dist/input

      - name: Prepare Docker build binaries
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p targets/linux/amd64 targets/linux/arm64 targets/linux/arm/v7 targets/linux/riscv64

          cp dist/input/MediaWarp_linux_amd64/MediaWarp targets/linux/amd64/MediaWarp
          cp dist/input/MediaWarp_linux_arm64/MediaWarp targets/linux/arm64/MediaWarp
          cp dist/input/MediaWarp_linux_armv7/MediaWarp targets/linux/arm/v7/MediaWarp
          cp dist/input/MediaWarp_linux_riscv64/MediaWarp targets/linux/riscv64/MediaWarp

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mediawarp
          tags: ${{ inputs.tags }}
          labels: |
            org.opencontainers.image.title=MediaWarp
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
            linux/riscv64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker Hub Description
        if: ${{ inputs.push }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/mediawarp
          short-description: ${{ github.event.repository.description }}
