name: Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dev.yaml"
      - ".github/workflows/build-binary.yaml"
      - ".github/workflows/build-docker.yaml"
      - "go.mod"
      - "go.sum"
      - "**/*.go"
      - "config/config.yaml.example"
      - "docker/Dockerfile.ci"

permissions:
  contents: write
  packages: write

jobs:
  metadata:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Prepare pre-release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          echo "version=prerelease-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

  build-binary:
    needs: metadata
    uses: ./.github/workflows/build-binary.yaml
    with:
      version: ${{ needs.metadata.outputs.version }}
      commit_hash: ${{ github.sha }}
      build_date: ${{ needs.metadata.outputs.build_date }}

  build-docker:
    needs: [metadata, build-binary]
    uses: ./.github/workflows/build-docker.yaml
    with:
      push: true
      tags: |
        type=raw,value=${{ needs.metadata.outputs.version }}
        type=raw,value=prerelease-latest
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  github-prerelease:
    name: Create GitHub Pre-release
    needs: [metadata, build-binary, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: MediaWarp_*
          path: dist/input

      - name: Package release files
        shell: bash
        run: |
          set -euo pipefail

          input_dir="${GITHUB_WORKSPACE}/dist/input"
          output_dir="${GITHUB_WORKSPACE}/dist/release"
          mkdir -p "${output_dir}"

          for artifact_dir in "${input_dir}"/MediaWarp_*; do
            [[ -d "${artifact_dir}" ]] || continue

            target="${artifact_dir##*/MediaWarp_}"
            package_dir="${GITHUB_WORKSPACE}/dist/package/${target}"
            mkdir -p "${package_dir}"

            shopt -s nullglob
            bins=("${artifact_dir}"/*)
            shopt -u nullglob

            if (( ${#bins[@]} != 1 )); then
              echo "Expected exactly one binary in ${artifact_dir}, found ${#bins[@]}" >&2
              exit 1
            fi

            bin_path="${bins[0]}"
            bin_name="$(basename "${bin_path}")"

            cp "${bin_path}" "${package_dir}/${bin_name}"
            cp LICENSE "${package_dir}/LICENSE"
            cp README.md "${package_dir}/README.md"
            cp config/config.yaml.example "${package_dir}/config.yaml.example"

            pushd "${package_dir}" > /dev/null

            if [[ "${bin_name}" == *.exe ]]; then
              zip -r "${output_dir}/MediaWarp_${{ needs.metadata.outputs.version }}_${target}.zip" "${bin_name}" LICENSE README.md config.yaml.example
            else
              chmod +x "${bin_name}"
              tar czf "${output_dir}/MediaWarp_${{ needs.metadata.outputs.version }}_${target}.tar.gz" "${bin_name}" LICENSE README.md config.yaml.example
            fi

            popd > /dev/null
          done

      - name: Cleanup existing pre-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'pre-release';

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted existing prerelease ${tag}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info(`No existing prerelease ${tag}`);
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted tag refs/tags/${tag}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info(`Tag refs/tags/${tag} already absent`);
            }

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: pre-release
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/release/MediaWarp_*
